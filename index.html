<!DOCTYPE html>

<title>Nexora Creative</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins, sans-serif;
scroll-behavior:smooth;
}

body{
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* TITLE */

.logo{
font-size:42px;
font-weight:700;
background:linear-gradient(90deg,#ffcc00,#ff7b00);
-webkit-background-clip:text;
color:transparent;
margin-bottom:20px;
letter-spacing:1px;
}

/* MAIN TEXT */

.hero h1{
font-size:34px;
max-width:700px;
line-height:1.4;
margin-bottom:25px;
}

/* TRUST WORDS */

.trust{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
margin-bottom:35px;
}

.trust span{
padding:10px 18px;
background:#1f1f1f;
border-radius:30px;
font-size:14px;
box-shadow:0 0 15px rgba(255,170,0,0.4);
transition:.3s;
}

.trust span:hover{
transform:scale(1.08);
box-shadow:0 0 25px #ffb300;
}

/* BUTTON */

.btn{
padding:16px 40px;
font-size:16px;
border:none;
border-radius:40px;
cursor:pointer;
background:linear-gradient(90deg,#ffcc00,#ff7b00);
color:black;
font-weight:600;
box-shadow:0 0 25px rgba(255,170,0,.6);
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 45px #ffb300;
}

/* WORK SECTION */

.work{
padding:120px 10%;
text-align:center;
}

.work h2{
font-size:30px;
margin-bottom:40px;
}

.folder{
width:260px;
height:200px;
margin:auto;
background:#1f1f1f;
border-radius:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
transition:.3s;
box-shadow:0 0 30px rgba(255,170,0,.3);
}

.folder:hover{
transform:scale(1.08);
box-shadow:0 0 50px #ffb300;
}

.folder i{
font-size:55px;
margin-bottom:10px;
}

/* CONNECT */

.connect{
padding:120px 10%;
text-align:center;
}

.connect h2{
font-size:30px;
margin-bottom:15px;
}

.whatsapp{
display:inline-block;
margin-top:25px;
padding:16px 35px;
background:#25D366;
color:white;
border-radius:40px;
font-weight:600;
text-decoration:none;
box-shadow:0 0 25px #25D366;
transition:.3s;
}

.whatsapp:hover{
transform:scale(1.05);
box-shadow:0 0 45px #25D366;
}

/* CONTACT FORM */

.contact{
padding:120px 10%;
text-align:center;
}

.contact h2{
margin-bottom:35px;
}

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea{
padding:14px;
border:none;
border-radius:10px;
background:#1f1f1f;
color:white;
}

.send{
background:linear-gradient(90deg,#ffcc00,#ff7b00);
border:none;
padding:14px;
border-radius:30px;
cursor:pointer;
font-weight:600;
box-shadow:0 0 20px rgba(255,170,0,.5);
}

.send:hover{
box-shadow:0 0 40px #ffb300;
}

</style>
</head>

<body>

<button class="btn">View My Thumbnails</button>
</a>

<div class="folder"
onclick="window.open('https://drive.google.com/drive/folders/15NWPQOTtkRJ0VDDd2KPna1C3maDxd8ba')">

<div style="font-size:60px;">📁</div>

<p>Open Thumbnail Folder</p>

</div>

</section>

<section class="connect">

href="https://wa.me/919588503698"
