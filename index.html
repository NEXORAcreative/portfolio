<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Creative</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
scroll-behavior:smooth;
}

body{
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
position:sticky;
top:0;
background:#0f0f0f;
z-index:1000;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00e5ff;
letter-spacing:1px;
}

nav a{
margin-left:30px;
text-decoration:none;
color:white;
font-size:16px;
transition:0.3s;
}

nav a:hover{
color:#00e5ff;
}

/* HERO */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:42px;
margin-bottom:15px;
}

.trust{
margin-top:10px;
color:#aaa;
font-size:15px;
}

.btn{
margin-top:25px;
padding:14px 32px;
border:none;
background:#00e5ff;
color:black;
font-size:16px;
border-radius:30px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px #00e5ff;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 30px #00e5ff;
}

/* WORK */

.work{
padding:100px 10%;
text-align:center;
}

.folder{
width:220px;
height:180px;
margin:auto;
background:#1a1a1a;
border-radius:15px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 20px rgba(0,229,255,0.2);
}

.folder:hover{
transform:scale(1.05);
box-shadow:0 0 40px #00e5ff;
}

.folder span{
margin-top:10px;
font-size:16px;
}

/* CONNECT */

.connect{
padding:100px 10%;
text-align:center;
}

.whatsapp-btn{
display:inline-block;
margin-top:20px;
padding:14px 32px;
background:#25D366;
color:white;
border-radius:30px;
text-decoration:none;
font-size:16px;
box-shadow:0 0 20px #25D366;
transition:0.3s;
}

.whatsapp-btn:hover{
transform:scale(1.05);
box-shadow:0 0 40px #25D366;
}

/* CONTACT FORM */

.contact{
padding:100px 10%;
text-align:center;
}

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea{
padding:12px;
border:none;
border-radius:8px;
background:#1a1a1a;
color:white;
}

button{
padding:12px;
background:#00e5ff;
border:none;
border-radius:25px;
cursor:pointer;
box-shadow:0 0 15px #00e5ff;
}

button:hover{
box-shadow:0 0 30px #00e5ff;
}

</style>
</head>

<body>

<header>

<div class="logo">Nexora Creative</div>

<nav>
<a href="#work">Work</a>
<a href="#connect">Hire Me</a>
<a href="#connect">Connect</a>
</nav>

</header>

<section class="hero">

<h1>High-CTR YouTube Thumbnails That Get Clicks</h1>

<div class="trust">
Photoshop Expert • High-CTR Specialist • Trusted by Creators • Fast Delivery
</div>

<a href="#work">
<button class="btn">View My Thumbnails</button>
</a>

</section>

<section class="work" id="work">

<h2>My Thumbnail Work</h2>
<br><br>

<div class="folder"
onclick="window.open('https://drive.google.com/drive/folders/15NWPQOTtkRJ0VDDd2KPna1C3maDxd8ba')">

📁
<span>View My Thumbnails</span>

</div>

</section>

<section class="connect" id="connect">

<h2>Let's Connect</h2>
<br>

<p>WhatsApp: 9588503698</p>

<a class="whatsapp-btn"
href="https://wa.me/919588503698"
target="_blank">

Connect Me On WhatsApp

</a>

</section>

<section class="contact">

<h2>Send Me a Message</h2>

<form action="mailto:kanhaeditorofficial@gmail.com" method="post" enctype="text/plain">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea rows="5" placeholder="Your Message"></textarea>

<button type="submit">Send Email</button>

</form>

</section>

</body>
</html>
