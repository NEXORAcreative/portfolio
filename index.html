<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexora Creative</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0b0b;
color:white;
text-align:center;
padding:40px 20px;
}

/* LOGO */

.logo{
font-size:34px;
font-weight:700;
background:linear-gradient(90deg,#ffcc00,#ff8c00);
-webkit-background-clip:text;
color:transparent;
margin-bottom:25px;
}

/* HERO TITLE */

.hero h1{
font-size:36px;
line-height:1.3;
margin-bottom:30px;
}

/* TRUST WORDS */

.trust{
display:flex;
flex-direction:column;
align-items:center;
gap:14px;
margin-bottom:35px;
}

.trust span{
padding:12px 25px;
background:#1a1a1a;
border-radius:40px;
font-size:15px;
width:240px;
box-shadow:0 0 15px rgba(255,170,0,0.5);
}

/* MAIN BUTTON */

.btn{
display:inline-block;
margin-top:10px;
padding:18px 45px;
font-size:18px;
font-weight:600;
border-radius:50px;
background:linear-gradient(90deg,#ffcc00,#ff8c00);
color:black;
text-decoration:none;
box-shadow:0 0 25px rgba(255,170,0,0.8);
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 40px rgba(255,170,0,1);
}

/* FOLDER CARD */

.folder-section{
margin-top:60px;
display:flex;
justify-content:center;
}

.folder-card{
width:260px;
height:160px;
background:linear-gradient(145deg,#1c1c1c,#111);
border-radius:18px;
box-shadow:0 0 25px rgba(255,170,0,0.3);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
}

.folder-card:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 0 40px rgba(255,170,0,0.8);
}

.folder-icon{
font-size:50px;
margin-bottom:10px;
}

.folder-text{
font-size:16px;
opacity:0.8;
}

/* CONNECT SECTION */

.connect{
margin-top:60px;
}

.connect h2{
margin-bottom:20px;
font-size:26px;
}

.whatsapp-btn{
display:inline-block;
padding:15px 35px;
border-radius:40px;
background:#25D366;
color:white;
font-weight:600;
text-decoration:none;
box-shadow:0 0 20px rgba(37,211,102,0.7);
transition:0.3s;
}

.whatsapp-btn:hover{
transform:scale(1.05);
box-shadow:0 0 30px rgba(37,211,102,1);
}

</style>

</head>

<body>

<div class="logo">Nexora Creative</div>

<section class="hero">

<h1>
High-CTR YouTube Thumbnails<br>
That Make People Click
</h1>

<div class="trust">

<span>Photoshop Expert</span>
<span>High-CTR Specialist</span>
<span>Trusted by Creators</span>
<span>Fast Delivery</span>

</div>

<a class="btn" href="https://drive.google.com/drive/folders/15NWPQOTtkRJ0VDDd2KPna1C3maDxd8ba" target="_blank">
View My Thumbnails
</a>

</section>


<div class="folder-section">

<div class="folder-card" onclick="window.open('https://drive.google.com/drive/folders/15NWPQOTtkRJ0VDDd2KPna1C3maDxd8ba')">

<div class="folder-icon">📁</div>

<div class="folder-text">
Open Thumbnail Portfolio
</div>

</div>

</div>


<section class="connect">

<h2>Let's Connect</h2>

<a class="whatsapp-btn" href="https://wa.me/919528503698">

Connect Me on WhatsApp

</a>

</section>

</body>
</html>
