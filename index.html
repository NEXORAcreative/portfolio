<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA Creative Portfolio</title>
<style>
  /* Basic body and font */
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    color: #333;
    text-align: center;
  }

  /* Header style */
  header {
    background-color: #1e1e1e;
    color: #fff;
    padding: 40px 20px;
  }

  header h1 {
    margin: 0;
    font-size: 3em;
    letter-spacing: 2px;
  }

  header p {
    font-size: 1.2em;
    margin-top: 10px;
    color: #ccc;
  }

  /* Gallery section */
  h2 {
    margin-top: 50px;
    color: #1e1e1e;
    font-size: 2em;
  }

  .gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    margin-bottom: 50px;
  }

  .gallery img {
    width: 250px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  }

  /* WhatsApp button */
  .hire-me {
    display: inline-block;
    margin-bottom: 50px;
    background-color: #25d366;
    color: white;
    padding: 15px 30px;
    border-radius: 50px;
    text-decoration: none;
    font-size: 1.3em;
    transition: background 0.3s;
  }

  .hire-me:hover {
    background-color: #1ebe57;
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <h1>NEXORA Creative</h1>
  <p>Your Graphic Design Portfolio</p>
</header>
