<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexora Creative</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
scroll-behavior:smooth;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#000;
position:sticky;
top:0;
z-index:100;
}

.logo img{
height:50px;
}

.menu a{
margin:0 15px;
color:white;
text-decoration:none;
font-weight:bold;
}

.menu a:hover{
color:#ffd700;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:40px;
color:#ffd700;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:.8;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:25px;
padding:14px 30px;
background:#ffd700;
color:black;
font-weight:bold;
border-radius:8px;
text-decoration:none;
box-shadow:0 0 20px #ffd700;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 30px #ffd700;
}

/* WORK SECTION */

.work{
text-align:center;
padding:80px 20px;
}

.folder{
width:220px;
margin:auto;
padding:40px;
border-radius:15px;
background:#111;
box-shadow:0 0 20px rgba(255,215,0,.4);
transition:.3s;
}

.folder:hover{
transform:scale(1.05);
box-shadow:0 0 30px gold;
}

.folder a{
text-decoration:none;
color:white;
font-weight:bold;
}

/* CONTACT */

.contact{
text-align:center;
padding:80px 20px;
}

.whatsapp{
display:inline-block;
background:#25D366;
padding:15px 30px;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 20px #25D366;
transition:.3s;
}

.whatsapp:hover{
transform:scale(1.05);
box-shadow:0 0 30px #25D366;
}

/* FORM */

form{
max-width:400px;
margin:auto;
margin-top:40px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
background:#111;
border:1px solid #333;
color:white;
border-radius:6px;
}

button{
width:100%;
padding:14px;
background:#ffd700;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 20px #ffd700;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
opacity:.6;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="logo">
<img src="Logo NEXORA creative.png">
</div>

<div class="menu">
<a href="#work">WORK</a>
<a href="#contact">CONTACT</a>
<a href="#contact">HIRE ME</a>
</div>

</nav>

<!-- HERO -->

<section class="hero">

<h1>High CTR YouTube Thumbnails</h1>

<p>I design thumbnails that increase clicks and views.</p>

<a class="btn" href="#work">View My Work</a>

</section>

<!-- WORK -->

<section class="work" id="work">

<h2>View My Thumbnails</h2>

<div class="folder">

<a href="https://drive.google.com/drive/folders/15NWPQOTtkRJ0VDDd2KPna1C3maDxd8ba" target="_blank">

📁 Open Thumbnail Folder

</a>

</div>

</section>

<!-- CONTACT -->

<section class="contact" id="contact">

<h2>Let's Connect</h2>

<br>

<a class="whatsapp" href="https://wa.me/919528503698">

Connect Me On WhatsApp

</a>

<form action="mailto:kanhaeditorofficial@gmail.com" method="post" enctype="text/plain">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Email Address" required>

<textarea placeholder="Project Details..." rows="5"></textarea>

<button type="submit">Send Message</button>

</form>

</section>

<footer>

© 2026 Nexora Creative

</footer>

</body>
</html>
